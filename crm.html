                                                        <table>
                                                            <thead>
                                                                <tr>
                                                                    <th>Contact</th>
                                                                    <th>Role</th>
                                                                    <th>Response</th>
                                                                    <th>Influence</th>
                                                                    <th>Rating (this opp)</th>
                                                                    <th>Notes (this opp)</th>
                                                                    <th></th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {visibleContacts.map(c => {
                                                                    const s = stakeholderState[c.id] || {};
                                                                    return (
                                                                        <tr key={c.id}>
                                                                            <td>
                                                                                <div style={{ fontWeight: 600 }}>{c.firstName} {c.lastName}</div>
                                                                                <div style={{ fontSize: 11, color: '#888' }}>{c.jobTitle || '—'}</div>
                                                                            </td>
                                                                            <td>
                                                                                {c.blueSheetRole ? (
                                                                                    <span className="badge blue">{c.blueSheetRole}</span>
                                                                                ) : (
                                                                                    <span style={{ color: '#999', fontSize: 12 }}>Not set</span>
                                                                                )}
                                                                            </td>
                                                                            <td>
                                                                                <span style={{ color: responseColor[c.responseMode] || '#999', fontWeight: 600, fontSize: 12 }}>
                                                                                    {c.responseMode || 'Unknown'}
                                                                                </span>
                                                                            </td>
                                                                            <td>{c.influence || '—'}</td>
                                                                            <td>
                                                                                <select
                                                                                    value={s.rating || ''}
                                                                                    onChange={(e) => updateStakeholder(c.id, 'rating', e.target.value)}
                                                                                    style={{ padding: '4px 8px', border: '1px solid #d0d0d0', borderRadius: 4, color: ratingColor[s.rating] || '#333', fontWeight: 600 }}
                                                                                >
                                                                                    <option value="">—</option>
                                                                                    <option value="Supporter">Supporter</option>
                                                                                    <option value="Neutral">Neutral</option>
                                                                                    <option value="Opponent">Opponent</option>
                                                                                </select>
                                                                            </td>
                                                                            <td>
                                                                                <input
                                                                                    type="text"
                                                                                    value={s.notes || ''}
                                                                                    onChange={(e) => updateStakeholder(c.id, 'notes', e.target.value)}
                                                                                    placeholder="e.g., champion, wants demo..."
                                                                                    style={{ padding: '4px 8px', border: '1px solid #d0d0d0', borderRadius: 4, width: '100%', minWidth: 160 }}
                                                                                />
                                                                            </td>
                                                                            <td>
                                                                                <button
                                                                                    className="btn small secondary"
                                                                                    onClick={() => updateStakeholder(c.id, 'hidden', true)}
                                                                                    title="Not involved in this opp"
                                                                                >
                                                                                    Hide
                                                                                </button>
                                                                            </td>
                                                                        </tr>
                                                                    );
                                                                })}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                )}

                                                {hiddenContacts.length > 0 && (
                                                    <details style={{ marginTop: 12 }}>
                                                        <summary style={{ cursor: 'pointer', fontSize: 13, color: '#666' }}>
                                                            Hidden from this opp ({hiddenContacts.length})
                                                        </summary>
                                                        <div style={{ marginTop: 8, paddingLeft: 12 }}>
                                                            {hiddenContacts.map(c => (
                                                                <div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '4px 0', fontSize: 13 }}>
                                                                    <span>{c.firstName} {c.lastName} <span style={{ color: '#888' }}>· {c.jobTitle || 'No title'}</span></span>
                                                                    <button
                                                                        className="btn small"
                                                                        onClick={() => updateStakeholder(c.id, 'hidden', false)}
                                                                    >
                                                                        Unhide
                                                                    </button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </details>
                                                )}
                                            </>
                                        )}
                                    </div>
                                </div>

                                {formData.id && (
                                    <RelatedActivity
                                        activities={(data.activities || []).filter(a => a.opportunityId === formData.id)}
                                        opportunities={data.opportunities}
                                        getAccountName={getAccountName}
                                        getContactName={getContactName}
                                        showAccount={true}
                                        showContact={true}
                                        showOpportunity={false}
                                    />
                                )}
                                <div style={{ display: 'flex', gap: '10px', marginTop: '20px', flexWrap: 'wrap' }}>
                                    <button className="btn" onClick={() => onSave('opportunities', formData)}>Save</button>
                                    <button className="btn secondary" onClick={onClose}>Cancel</button>
                                    {formData.id && (
                                        <button
                                            className="btn secondary"
                                            onClick={() => {
                                                if (!onSwitchModal) return;
                                                onSwitchModal({
                                                    type: 'task',
                                                    data: {
                                                        opportunityId: formData.id,
                                                        accountId: formData.accountId || null
                                                    }
                                                });
                                            }}
                                            title="Create a task linked to this opportunity"
                                        >
                                            + Add Task
                                        </button>
                                    )}
                                    {formData.id && <button className="btn danger" onClick={() => onDelete('opportunities', formData.id)}>Delete</button>}
                                </div>
                            </ModalContent>
                        </ModalOverlay>
                    );

                case 'task':
                case 'task-detail':
                    return (
                        <ModalOverlay onClose={onClose}>
                            <ModalContent title={formData.id ? 'Edit Task' : 'New Task'}>
                                <div className="form-group">
                                    <label>Description *</label>
                                    <textarea
                                        value={formData.description || ''}
                                        onChange={(e) => handleChange('description', e.target.value)}
                                    />
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Type *</label>
                                        <select
                                            value={formData.type || ''}
                                            onChange={(e) => handleChange('type', e.target.value)}
                                        >
                                            <option value="">Select type</option>
                                            {['Call', 'Email', 'Meeting', 'Follow-up', 'Demo', 'Quote', 'Internal'].map(t => (
                                                <option key={t} value={t}>{t}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label>Priority *</label>
                                        <select
                                            value={formData.priority || ''}
                                            onChange={(e) => handleChange('priority', e.target.value)}
                                        >
                                            <option value="">Select priority</option>
                                            <option value="High">High</option>
                                            <option value="Medium">Medium</option>
                                            <option value="Low">Low</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Due Date *</label>
                                        <input
                                            type="date"
                                            value={formData.dueDate || ''}
                                            onChange={(e) => handleChange('dueDate', e.target.value)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Due Time</label>
                                        <input
                                            type="time"
                                            value={formData.dueTime || ''}
                                            onChange={(e) => handleChange('dueTime', e.target.value)}
                                        />
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label>Related Contact</label>
                                    <select
                                        value={formData.contactId || ''}
                                        onChange={(e) => handleChange('contactId', e.target.value ? parseInt(e.target.value) : null)}
                                    >
                                        <option value="">None</option>
                                        {data.contacts.map(c => (
                                            <option key={c.id} value={c.id}>{c.firstName} {c.lastName}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Related Account</label>
                                    <select
                                        value={formData.accountId || ''}
                                        onChange={(e) => handleChange('accountId', e.target.value ? parseInt(e.target.value) : null)}
                                    >
                                        <option value="">None</option>
                                        {data.accounts.map(a => (
                                            <option key={a.id} value={a.id}>{a.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Related Opportunity</label>
                                    <select
                                        value={formData.opportunityId || ''}
                                        onChange={(e) => handleChange('opportunityId', e.target.value ? parseInt(e.target.value) : null)}
                                    >
                                        <option value="">None</option>
                                        {data.opportunities.map(o => (
                                            <option key={o.id} value={o.id}>{o.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Recurring</label>
                                    <select
                                        value={formData.recurring || 'none'}
                                        onChange={(e) => handleChange('recurring', e.target.value)}
                                    >
                                        <option value="none">None</option>
                                        <option value="daily">Daily</option>
                                        <option value="weekly">Weekly</option>
                                        <option value="biweekly">Bi-weekly</option>
                                        <option value="monthly">Monthly</option>
                                        <option value="quarterly">Quarterly</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>
                                        <input
                                            type="checkbox"
                                            checked={formData.completed || false}
                                            onChange={(e) => handleChange('completed', e.target.checked)}
                                        />
                                        {' '}Mark as completed
                                    </label>
                                </div>
                                <div style={{ display: 'flex', gap: '10px', marginTop: '20px' }}>
                                    <button className="btn" onClick={() => onSave('tasks', formData)}>Save</button>
                                    <button className="btn secondary" onClick={onClose}>Cancel</button>
                                    {formData.id && <button className="btn danger" onClick={() => onDelete('tasks', formData.id)}>Delete</button>}
                                </div>
                            </ModalContent>
                        </ModalOverlay>
                    );

                case 'activity-detail':
                    return (
                        <ModalOverlay onClose={onClose}>
                            <ModalContent title="Edit Activity">
                                <div className="form-group">
                                    <label>Type *</label>
                                    <select
                                        value={formData.type || ''}
                                        onChange={(e) => handleChange('type', e.target.value)}
                                    >
                                        <option value="">Select type</option>
                                        {['Call', 'Email', 'Meeting', 'Demo', 'Note', 'Quote Sent', 'Site Visit'].map(t => (
                                            <option key={t} value={t}>{t}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Description *</label>
                                    <textarea
                                        value={formData.description || ''}
                                        onChange={(e) => handleChange('description', e.target.value)}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Date *</label>
                                    <input
                                        type="date"
                                        value={formData.date || ''}
                                        onChange={(e) => handleChange('date', e.target.value)}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Next Step</label>
                                    <input
                                        type="text"
                                        value={formData.nextStep || ''}
                                        onChange={(e) => handleChange('nextStep', e.target.value)}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Follow-up Date</label>
                                    <input
                                        type="date"
                                        value={formData.followUpDate || ''}
                                        onChange={(e) => handleChange('followUpDate', e.target.value)}
                                    />
                                    <div style={{ fontSize: '11px', color: '#888', marginTop: '4px' }}>
                                        Editing this does NOT change the linked task. Update the task directly in the Tasks tab if needed.
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label>Related Contact</label>
                                    <SearchableContactSelect
                                        value={formData.contactId || null}
                                        onChange={(id) => handleChange('contactId', id)}
                                        contacts={data.contacts}
                                        getAccountName={getAccountName}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Related Account</label>
                                    <select
                                        value={formData.accountId || ''}
                                        onChange={(e) => handleChange('accountId', e.target.value ? parseInt(e.target.value) : null)}
                                    >
                                        <option value="">None</option>
                                        {data.accounts.map(a => (
                                            <option key={a.id} value={a.id}>{a.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div style={{ display: 'flex', gap: '10px', marginTop: '20px' }}>
                                    <button className="btn" onClick={() => onSave('activities', formData)}>Save</button>
                                    <button className="btn secondary" onClick={onClose}>Cancel</button>
                                    {formData.id && <button className="btn danger" onClick={() => onDelete('activities', formData.id)}>Delete</button>}
                                </div>
                            </ModalContent>
                        </ModalOverlay>
                    );

                case 'quick-follow-up':
                    return (
                        <ModalOverlay onClose={onClose}>
                            <ModalContent title="Add Follow-up">
                                <div className="form-group">
                                    <label>Contact *</label>
                                    <select
                                        value={formData.contactId || ''}
                                        onChange={(e) => handleChange('contactId', parseInt(e.target.value))}
                                    >
                                        <option value="">Select contact</option>
                                        {data.contacts.map(c => (
                                            <option key={c.id} value={c.id}>{c.firstName} {c.lastName}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Description *</label>
                                    <textarea
                                        value={formData.description || ''}
                                        onChange={(e) => handleChange('description', e.target.value)}
                                        placeholder="What do you need to follow up on?"
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Due Date *</label>
                                    <input
                                        type="date"
                                        value={formData.dueDate || ''}
                                        onChange={(e) => handleChange('dueDate', e.target.value)}
                                    />
                                </div>
                                <div style={{ display: 'flex', gap: '10px', marginTop: '20px' }}>
                                    <button className="btn" onClick={() => {
                                        const taskData = {
                                            ...formData,
                                            type: 'Follow-up',
                                            priority: 'Medium',
                                            recurring: 'none'
                                        };
                                        onSave('tasks', taskData);
                                    }}>Create Task</button>
                                    <button className="btn secondary" onClick={onClose}>Cancel</button>
                                </div>
                            </ModalContent>
                        </ModalOverlay>
                    );

                case 'quick-note':
                    return (
                        <ModalOverlay onClose={onClose}>
                            <ModalContent title="Quick Note" wide>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Account *</label>
                                        <select
                                            value={formData.accountId || ''}
                                            onChange={(e) => handleChange('accountId', e.target.value)}
                                        >
                                            <option value="">Select account</option>
                                            {data.accounts.map(a => (
                                                <option key={a.id} value={a.id}>{a.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label>Contact (optional)</label>
                                        <select
                                            value={formData.contactId || ''}
                                            onChange={(e) => handleChange('contactId', e.target.value)}
                                        >
                                            <option value="">Select contact</option>
                                            {data.contacts
                                                .filter(c => !formData.accountId || contactHasAccount(c, parseInt(formData.accountId)))
                                                .map(c => (
                                                    <option key={c.id} value={c.id}>{c.firstName} {c.lastName}</option>
                                                ))
                                            }
                                        </select>
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label>Opportunity (optional)</label>
                                    <select
                                        value={formData.opportunityId || ''}
                                        onChange={(e) => handleChange('opportunityId', e.target.value)}
                                    >
                                        <option value="">Select opportunity</option>
                                        {data.opportunities
                                            .filter(o => !formData.accountId || o.accountId === parseInt(formData.accountId))
                                            .map(o => (
                                                <option key={o.id} value={o.id}>{o.name}</option>
                                            ))
                                        }
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Notes (dump everything here)</label>
                                    <textarea
                                        value={formData.notes || ''}
                                        onChange={(e) => handleChange('notes', e.target.value)}
                                        placeholder="Word vomit away... what happened, who said what, key takeaways, concerns, wins, anything."
                                        style={{ minHeight: '180px', fontSize: '14px', lineHeight: '1.6' }}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Next Step</label>
                                    <input
                                        type="text"
                                        value={formData.nextStep || ''}
                                        onChange={(e) => handleChange('nextStep', e.target.value)}
                                        placeholder="What needs to happen next?"
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Follow-up Date (auto-creates a task)</label>
                                    <input
                                        type="date"
                                        value={formData.followUpDate || ''}
                                        onChange={(e) => handleChange('followUpDate', e.target.value)}
                                    />
                                    <div style={{ fontSize: '11px', color: '#888', marginTop: '4px' }}>
                                        Leave blank to skip. Setting a date will create a follow-up task automatically.
                                    </div>
                                </div>
                                <div style={{ display: 'flex', gap: '10px', marginTop: '15px' }}>
                                    <button className="btn" onClick={() => onSaveQuickNote(formData)} disabled={!formData.accountId || !formData.notes}>Save Note</button>
                                    <button className="btn danger" onClick={onClose}>Cancel</button>
                                </div>
                            </ModalContent>
                        </ModalOverlay>
                    );

                case 'import-sfdc': {
                    const ownerFilterRaw = formData._ownerFilter ?? 'Bjelica, Buttle';
                    const ownerFilters = ownerFilterRaw.split(',').map(s => s.trim()).filter(Boolean);
                    const contactsCsv = formData._contactsCsv || '';
                    const accountsCsv = formData._accountsCsv || '';
                    const rawText = formData._rawText || '';
                    const columnOrderRaw = formData._columnOrder ?? 'Salutation, First Name, Last Name, Title, Account Name, Mailing Street, Mailing City, Mailing State/Province, Mailing Zip/Postal Code, Mailing Country, Phone, Mobile Phone, Main Email, Account Owner';
                    const columnOrder = columnOrderRaw.split(',').map(s => s.trim()).filter(Boolean);

                    // Parse raw text if present; convert to CSV and prefer over uploaded CSV.
                    const rawRecords = rawText.trim() ? parseSfdcRawText(rawText, columnOrder) : [];
                    const effectiveContactsCsv = rawRecords.length > 0
                        ? rawRecordsToCsv(rawRecords)
                        : contactsCsv;

                    const plan = effectiveContactsCsv
                        ? buildSfdcImportPlan(accountsCsv, effectiveContactsCsv, ownerFilters, data.accounts, data.contacts)
                        : null;

                    const readFile = (file, key) => {
                        const reader = new FileReader();
                        reader.onload = (e) => handleChange(key, e.target.result);
                        reader.readAsText(file);
                    };

                    return (
                        <ModalOverlay onClose={onClose}>
                            <ModalContent title="Import from Salesforce" wide={true}>
                                <div style={{ fontSize: 13, color: '#555', marginBottom: 16, lineHeight: 1.5 }}>
                                    Two ways in: (a) upload CSV exports from SFDC, or (b) paste the raw Notepad output from the <code>sfdc-capture.ahk</code> chunked-copy script. Either way I'll filter by owner, link contacts to accounts by name, and skip duplicates (same account name, or same first+last+email on a contact).
                                </div>

                                <div className="form-group">
                                    <label>Owner filter (comma-separated, case-insensitive substring match)</label>
                                    <input
                                        type="text"
                                        value={ownerFilterRaw}
                                        onChange={(e) => handleChange('_ownerFilter', e.target.value)}
                                        placeholder="Bjelica, Buttle"
                                    />
                                    <div style={{ fontSize: 11, color: '#888', marginTop: 4 }}>
                                        Matches any row whose Contact Owner contains one of these. Leave blank to import everything.
                                    </div>
                                </div>

                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Contacts CSV (one option)</label>
                                        <input
                                            type="file"
                                            accept=".csv"
                                            onChange={(e) => { const f = e.target.files?.[0]; if (f) readFile(f, '_contactsCsv'); }}
                                        />
                                        {contactsCsv && <div style={{ fontSize: 11, color: '#2e7d32', marginTop: 4 }}>✓ Loaded ({(contactsCsv.length / 1024).toFixed(1)} KB)</div>}
                                    </div>
                                    <div className="form-group">
                                        <label>Accounts CSV (optional)</label>
                                        <input
                                            type="file"
                                            accept=".csv"
                                            onChange={(e) => { const f = e.target.files?.[0]; if (f) readFile(f, '_accountsCsv'); }}
                                        />
                                        {accountsCsv && <div style={{ fontSize: 11, color: '#2e7d32', marginTop: 4 }}>✓ Loaded ({(accountsCsv.length / 1024).toFixed(1)} KB)</div>}
                                    </div>
                                </div>

                                <div style={{ textAlign: 'center', color: '#999', margin: '12px 0', fontSize: 12, fontWeight: 600, letterSpacing: 1 }}>— OR —</div>

                                <div className="form-group">
                                    <label>Paste raw Notepad text (from sfdc-capture.ahk)</label>
                                    <textarea
                                        rows={8}
                                        style={{ fontFamily: 'monospace', fontSize: 11, width: '100%' }}
                                        value={rawText}
                                        onChange={(e) => handleChange('_rawText', e.target.value)}
                                        placeholder="Paste the whole Notepad buffer here — including chunk markers. Row numbers + 14 field lines per contact, one field per line."
                                    />
                                    {rawText.trim() && (
                                        <div style={{ fontSize: 11, marginTop: 4, color: rawRecords.length > 0 ? '#2e7d32' : '#c62828' }}>
                                            {rawRecords.length > 0
                                                ? `✓ Parsed ${rawRecords.length} unique contact row(s) from raw text`
                                                : '✗ Could not parse any rows — check column order below and that row numbers are on their own lines'}
                                        </div>
                                    )}
                                </div>

                                <details style={{ marginBottom: 12, fontSize: 12 }}>
                                    <summary style={{ cursor: 'pointer', color: '#666' }}>Column order (edit only if your SFDC report columns differ)</summary>
                                    <div style={{ marginTop: 6 }}>
                                        <input
                                            type="text"
                                            value={columnOrderRaw}
                                            onChange={(e) => handleChange('_columnOrder', e.target.value)}
                                            style={{ fontFamily: 'monospace', fontSize: 11, width: '100%' }}
                                        />
                                        <div style={{ fontSize: 11, color: '#888', marginTop: 4 }}>
                                            Comma-separated, in the exact order columns appear in your SFDC report. The last column MUST be the owner field so parsing can validate each record.
                                        </div>
                                    </div>
                                </details>

                                {plan && (
                                    <div style={{ marginTop: 16, padding: 14, background: '#f5f5f5', borderRadius: 6, fontSize: 13 }}>
                                        <div style={{ fontWeight: 600, marginBottom: 8 }}>Preview</div>
                                        <div>Matching contacts in CSV: <strong>{plan.totalMatchingContacts}</strong></div>
                                        <div style={{ color: '#2e7d32' }}>Will add: <strong>{plan.plannedAccounts.length}</strong> accounts, <strong>{plan.plannedContacts.length}</strong> contacts</div>
                                        {(plan.skippedAccounts.length > 0 || plan.skippedContacts.length > 0) && (
                                            <div style={{ color: '#888', marginTop: 4 }}>
                                                Already in CRM (skipped): {plan.skippedAccounts.length} accounts, {plan.skippedContacts.length} contacts
                                            </div>
                                        )}
                                        {plan.orphanedContacts.length > 0 && (
                                            <div style={{ color: '#e65100', marginTop: 4 }}>
                                                {plan.orphanedContacts.length} contact(s) have no Account Name and will be dropped.
                                            </div>
                                        )}
                                        {!plan.hasAccountsCsv && plan.plannedAccounts.length > 0 && (
                                            <div style={{ color: '#666', marginTop: 6, fontStyle: 'italic' }}>
                                                No Accounts CSV provided — accounts will be created as stubs with just the name. You can fill in region/address/phone later.
                                            </div>
                                        )}
                                        {plan.plannedAccounts.length > 0 && (
                                            <details style={{ marginTop: 8 }}>
                                                <summary style={{ cursor: 'pointer' }}>Accounts to add ({plan.plannedAccounts.length})</summary>
                                                <div style={{ maxHeight: 150, overflowY: 'auto', marginTop: 6, fontFamily: 'monospace', fontSize: 11 }}>
                                                    {plan.plannedAccounts.map((a, i) => <div key={i}>{a.name}{a.city ? ` (${a.city})` : ''}</div>)}
                                                </div>
                                            </details>
                                        )}
                                        {plan.plannedContacts.length > 0 && (
                                            <details style={{ marginTop: 4 }}>
                                                <summary style={{ cursor: 'pointer' }}>Contacts to add ({plan.plannedContacts.length})</summary>
                                                <div style={{ maxHeight: 150, overflowY: 'auto', marginTop: 6, fontFamily: 'monospace', fontSize: 11 }}>
                                                    {plan.plannedContacts.map((c, i) => <div key={i}>{c.firstName} {c.lastName} · {c._accountLookupName}</div>)}
                                                </div>
                                            </details>
                                        )}
                                    </div>
                                )}

                                <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
                                    <button
                                        className="btn"
                                        disabled={!plan || (plan.plannedAccounts.length === 0 && plan.plannedContacts.length === 0)}
                                        onClick={() => {
                                            const result = onExecuteSfdcImport(plan);
                                            alert(`Imported ${result.accountsAdded} accounts, ${result.contactsAdded} contacts.${result.contactsDroppedNoAccount > 0 ? ` ${result.contactsDroppedNoAccount} contact(s) dropped (account not found).` : ''}`);
                                            onClose();
                                        }}
                                    >
                                        Import
                                    </button>
                                    <button className="btn secondary" onClick={onClose}>Cancel</button>
                                </div>
                            </ModalContent>
                        </ModalOverlay>
                    );
                }

                default:
                    return null;
            }
        };

        // Modal Overlay and Content Components
        const ModalOverlay = ({ children, onClose }) => (
            <div className="modal-overlay" onClick={onClose}>
                <div onClick={(e) => e.stopPropagation()}>
                    {children}
                </div>
            </div>
        );

        const ModalContent = ({ title, children, wide }) => (
            <div className="modal" style={wide ? { maxWidth: '800px' } : {}}>
                <div className="modal-header">
                    <div className="modal-title">{title}</div>
                </div>
                <div className="modal-body">
                    {children}
                </div>
            </div>
        );

        // ===== Auth + initial Firestore load, THEN render the App =====
        const loginScreen = document.getElementById('login-screen');
        const loginBtn = document.getElementById('login-btn');
        const loginStatus = document.getElementById('login-status');
        const root = ReactDOM.createRoot(document.getElementById('root'));

        loginBtn.addEventListener('click', async () => {
            try {
                loginStatus.textContent = 'Signing in...';
                await window.__auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            } catch (err) {
                loginStatus.textContent = 'Sign-in failed: ' + (err.message || err);
            }
        });

        const showLogin = () => {
            loginScreen.classList.add('active');
            document.getElementById('root').style.display = 'none';
        };
        const hideLogin = () => {
            loginScreen.classList.remove('active');
            document.getElementById('root').style.display = '';
        };

        const loadFromFirestoreThenRender = async (user) => {
            window.__currentUser = user;
            loginStatus.textContent = 'Loading your data...';
            try {
                const docRef = window.__db
                    .collection('users').doc(user.uid)
                    .collection('data').doc('main');
                const snap = await docRef.get();

                if (snap.exists) {
                    // Returning user: pull cloud copy.
                    window.__cachedDb = snap.data();
                } else {
                    // First-time login: migrate localStorage (if any) up to the cloud,
                    // otherwise start with empty stores.
                    let initial = null;
                    try {
                        const raw = localStorage.getItem(STORAGE_KEY);
                        if (raw) initial = JSON.parse(raw);
                    } catch (e) {}
                    if (!initial) {
                        initial = { _nextId: 1 };
                        STORES.forEach(s => initial[s] = []);
                    }
                    window.__cachedDb = initial;
                    // Push initial state up so the cloud has it.
                    await docRef.set(JSON.parse(JSON.stringify(initial)));
                }
                hideLogin();
                root.render(<App />);
            } catch (err) {
                console.error(err);
                loginStatus.textContent = 'Error loading data: ' + (err.message || err);
            }
        };

        window.__auth.onAuthStateChanged((user) => {
            if (user) {
                loadFromFirestoreThenRender(user);
            } else {
                window.__currentUser = null;
                window.__cachedDb = null;
                root.render(null);
                showLogin();
            }
        });
    </script>
</body>
</html>
