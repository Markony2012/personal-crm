<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Device Sales CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase (compat builds so we don't need a bundler) -->
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script>
        // Firebase configuration for the Personal CRM project.
        const firebaseConfig = {
            apiKey: "AIzaSyCpk476a8p1idJy5Op-zXMsyQ6mM_-qc4k",
            authDomain: "personal-crm-fdfa0.firebaseapp.com",
            projectId: "personal-crm-fdfa0",
            storageBucket: "personal-crm-fdfa0.firebasestorage.app",
            messagingSenderId: "697034392240",
            appId: "1:697034392240:web:d081cf9bc9f7c3700cb175"

        firebase.initializeApp(firebaseConfig);
        window.__db = firebase.firestore();
        window.__auth = firebase.auth();
    </script>
    <style>
        :root {
            --color-bg: #F5F6F8;
            --color-surface: #FFFFFF;
            --color-surface-soft: #FAFBFC;
            --color-border: #E6E8EC;
            --color-divider: #F0F2F5;
            --color-ink: #1A1D21;
            --color-text: #3C4148;
            --color-muted: #7A818A;
            --color-faint: #AAB0B8;
            --color-accent: #E30613;
            --color-accent-hover: #B80510;
            --color-accent-soft: rgba(227, 6, 19, 0.08);
            --color-accent-soft-hover: rgba(227, 6, 19, 0.14);
            --color-success: #17A864;
            --color-success-soft: #E5F5EC;
            --color-warn: #E8A24A;
            --color-warn-soft: #FBF1E3;
            --color-info: #2563EB;
            --color-info-soft: #E8EFFE;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 999px;
            --shadow-sm: 0 1px 2px rgba(16,24,40,0.04), 0 1px 3px rgba(16,24,40,0.05);
            --shadow-md: 0 2px 4px rgba(16,24,40,0.04), 0 8px 24px -12px rgba(16,24,40,0.10);
            --shadow-lg: 0 24px 48px -24px rgba(16,24,40,0.18), 0 2px 4px rgba(16,24,40,0.06);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--color-bg);
            color: var(--color-text);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
            padding: 16px;
            gap: 16px;
            background: var(--color-bg);
        }

        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.28s ease;
        }

        .sidebar.collapsed {
            transform: translateX(calc(-100% - 24px));
            position: absolute;
            z-index: 100;
            height: calc(100vh - 32px);
        }

        .sidebar-header {
            padding: 22px 22px 16px;
            font-size: 18px;
            font-weight: 700;
            color: var(--color-ink);
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header::before {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--color-accent);
            border-radius: 2px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 6px 12px;
        }

        .nav-item {
            padding: 10px 14px;
            cursor: pointer;
            color: var(--color-text);
            transition: all 0.15s ease;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--color-divider);
            color: var(--color-ink);
        }

        .nav-item.active {
            background: var(--color-accent-soft);
            color: var(--color-accent);
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 16px 20px 20px;
            border-top: 1px solid var(--color-divider);
            font-size: 12px;
            color: var(--color-muted);
        }

        .sidebar-footer button {
            background: none;
            border: none;
            color: var(--color-muted);
            cursor: pointer;
            padding: 6px 0;
            font-size: 12px;
            font-family: inherit;
            display: block;
            width: 100%;
            text-align: left;
            transition: color 0.15s;
        }

        .sidebar-footer button:hover {
            color: var(--color-accent);
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }

        .top-bar {
            background: var(--color-surface);
            border-radius: var(--radius-pill);
            box-shadow: var(--shadow-md);
            padding: 10px 12px 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--color-ink);
            padding: 6px 10px;
        }

        .search-box {
            flex: 0 1 420px;
            display: flex;
            align-items: center;
            background: var(--color-divider);
            border: 1px solid transparent;
            border-radius: var(--radius-pill);
            padding: 0 18px;
            transition: all 0.15s;
        }

        .search-box:focus-within {
            background: var(--color-surface);
            border-color: var(--color-accent);
            box-shadow: 0 0 0 4px var(--color-accent-soft);
        }

        .search-box .search-icon {
            color: var(--color-muted);
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .search-box input {
            border: none;
            background: none;
            outline: none;
            flex: 1;
            padding: 10px 0 10px 10px;
            font-size: 14px;
            font-family: inherit;
            color: var(--color-ink);
        }

        .search-box input::placeholder { color: var(--color-muted); }

        .quick-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--color-accent);
            color: white;
            border: 1px solid var(--color-accent);
            padding: 10px 20px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.15s ease;
            white-space: nowrap;
            line-height: 1.2;
        }

        .btn:hover {
            background: var(--color-accent-hover);
            border-color: var(--color-accent-hover);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.secondary {
            background: var(--color-surface);
            color: var(--color-ink);
            border-color: var(--color-border);
        }

        .btn.secondary:hover {
            background: var(--color-divider);
            border-color: var(--color-faint);
        }

        .btn.danger {
            background: var(--color-surface);
            color: var(--color-accent);
            border-color: var(--color-accent);
        }

        .btn.danger:hover {
            background: var(--color-accent);
            color: white;
        }

        .btn.ghost {
            background: transparent;
            color: var(--color-text);
            border-color: transparent;
        }

        .btn.ghost:hover {
            background: var(--color-divider);
            color: var(--color-ink);
        }

        .btn.small {
            padding: 7px 14px;
            font-size: 12.5px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 4px 24px 24px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            color: var(--color-ink);
            line-height: 1.15;
        }

        /* Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
        }

        .stat-card.pipeline { grid-column: 1 / -1; }

        .stat-value {
            font-size: 34px;
            font-weight: 700;
            color: var(--color-ink);
            letter-spacing: -0.02em;
            margin-bottom: 6px;
            line-height: 1.1;
        }

        .stat-label {
            font-size: 11px;
            color: var(--color-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        .stage-bar {
            display: flex;
            gap: 6px;
            margin-top: 18px;
        }

        .stage-segment {
            flex: 1;
            height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.02em;
        }

        .stage-segment:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .prospecting { background: #5B6B79; }
        .qualification { background: #3B82F6; }
        .preparation { background: #6366F1; }
        .presentation { background: #F59E0B; color: white; }
        .negotiation { background: #F97316; }
        .acquisition { background: #10B981; }

        .section {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 16px;
            color: var(--color-ink);
        }

        .task-list { list-style: none; }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid var(--color-divider);
            gap: 12px;
            transition: background 0.15s;
        }

        .task-item:hover { background: var(--color-surface-soft); }

        .task-item:last-child { border-bottom: none; }

        .task-item input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: var(--color-accent);
            flex-shrink: 0;
        }

        .task-content { flex: 1; min-width: 0; }

        .task-text { font-size: 14px; color: var(--color-text); font-weight: 500; }

        .task-meta {
            font-size: 12px;
            color: var(--color-muted);
            margin-top: 4px;
        }

        .task-item.overdue {
            background: var(--color-accent-soft);
            border-left: 3px solid var(--color-accent);
            padding-left: 12px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }
        .task-item.overdue .task-text { color: var(--color-accent); font-weight: 600; }

        .task-item.completed .task-text { text-decoration: line-through; color: var(--color-muted); }

        .priority-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .priority-high { background: var(--color-accent-soft); color: var(--color-accent); }
        .priority-medium { background: var(--color-warn-soft); color: #B46A1D; }
        .priority-low { background: var(--color-success-soft); color: var(--color-success); }

        /* Tables */
        .table-wrapper { overflow-x: auto; margin: 0 -4px; }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: var(--color-surface-soft);
            padding: 12px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--color-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--color-border);
            cursor: pointer;
            user-select: none;
            transition: color 0.15s;
        }

        th:hover { color: var(--color-ink); }

        td {
            padding: 14px;
            border-bottom: 1px solid var(--color-divider);
            font-size: 14px;
            color: var(--color-text);
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background: var(--color-surface-soft); }

        tr.clickable { cursor: pointer; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(16, 24, 40, 0.5);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            max-width: 640px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.22s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { transform: translateY(12px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--color-divider);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--color-ink);
        }

        .close-btn {
            background: var(--color-divider);
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--color-muted);
            width: 32px;
            height: 32px;
            border-radius: var(--radius-pill);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            line-height: 1;
        }

        .close-btn:hover {
            background: var(--color-accent-soft);
            color: var(--color-accent);
        }

        .modal-body { padding: 24px; }

        /* Forms */
        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--color-ink);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            color: var(--color-ink);
            background: var(--color-surface);
            transition: all 0.15s;
        }

        .form-group input:hover,
        .form-group textarea:hover,
        .form-group select:hover {
            border-color: var(--color-faint);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 4px var(--color-accent-soft);
        }

        .form-group textarea { resize: vertical; min-height: 100px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-row.full { grid-template-columns: 1fr; }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--color-divider);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 24px;
            gap: 4px;
        }

        .tab {
            padding: 10px 18px;
            cursor: pointer;
            color: var(--color-muted);
            border-bottom: 2px solid transparent;
            font-weight: 500;
            transition: all 0.15s;
            font-size: 14px;
            margin-bottom: -1px;
        }

        .tab:hover { color: var(--color-ink); }

        .tab.active {
            color: var(--color-accent);
            border-bottom-color: var(--color-accent);
            font-weight: 600;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            background: var(--color-divider);
            color: var(--color-text);
            border-radius: var(--radius-pill);
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .badge.blue { background: var(--color-info-soft); color: var(--color-info); }
        .badge.green { background: var(--color-success-soft); color: var(--color-success); }
        .badge.red { background: var(--color-accent-soft); color: var(--color-accent); }
        .badge.purple { background: #F1E8FB; color: #7C3AED; }

        /* Filter tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 16px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text);
            transition: all 0.15s;
        }

        .filter-tab:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .filter-tab.active {
            background: var(--color-accent);
            color: white;
            border-color: var(--color-accent);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--color-muted);
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* Checklist */
        .checklist { display: flex; flex-direction: column; gap: 8px; }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 14px;
            background: var(--color-surface-soft);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
        }

        .checklist-item input {
            margin-top: 3px;
            cursor: pointer;
            accent-color: var(--color-accent);
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .checklist-item label {
            flex: 1;
            cursor: pointer;
            margin: 0;
            font-size: 13px;
            line-height: 1.55;
            color: var(--color-text);
        }

        /* Detail view */
        .detail-view {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .detail-view.full { grid-template-columns: 1fr; }

        .detail-left, .detail-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 16px;
        }

        .field { display: flex; flex-direction: column; }

        .field-label {
            font-size: 11px;
            color: var(--color-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .field-value { font-size: 14px; color: var(--color-ink); }

        /* Activity */
        .activity-item {
            display: flex;
            gap: 16px;
            padding: 14px 16px;
            border-left: 3px solid var(--color-accent);
            background: var(--color-surface-soft);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin-bottom: 8px;
            transition: background 0.15s;
        }

        .activity-item:hover { background: var(--color-accent-soft); }

        .activity-date {
            font-size: 12px;
            color: var(--color-muted);
            flex: 0 0 68px;
            font-weight: 500;
        }

        .activity-content { flex: 1; min-width: 0; }

        .activity-type {
            font-size: 11px;
            font-weight: 700;
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .activity-text {
            font-size: 14px;
            color: var(--color-text);
            margin-top: 4px;
            word-wrap: break-word;
        }

        /* Region cards */
        .region-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 22px 24px 22px 28px;
            margin-bottom: 12px;
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .region-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--color-accent);
        }

        .region-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .region-name {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--color-ink);
        }

        .region-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
            font-size: 13px;
        }

        .region-stat { display: flex; justify-content: space-between; }
        .region-stat-label { color: var(--color-muted); }

<body>
    <div id="login-screen">
        <div id="login-card">
            <h1>Personal CRM</h1>
            <p>Sign in with your Google account to access your data on any device.</p>
            <button id="login-btn">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.92a8.78 8.78 0 0 0 2.68-6.61z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.34A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.97 10.71A5.41 5.41 0 0 1 3.68 9c0-.59.1-1.17.29-1.71V4.95H.96A8.997 8.997 0 0 0 0 9c0 1.45.35 2.82.96 4.05l3.01-2.34z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A8.97 8.97 0 0 0 9 0 8.997 8.997 0 0 0 .96 4.95l3.01 2.34C4.68 5.16 6.66 3.58 9 3.58z" fill="#EA4335"/></svg>
                Sign in with Google
            </button>
            <div class="login-status" id="login-status"></div>
        </div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Firestore-backed storage. localStorage is used only as a fallback / cache.
        const STORAGE_KEY = 'PersonalCRM';
        const STORES = ['accounts', 'contacts', 'opportunities', 'tasks', 'activities'];

        // Module-level cache and Firestore write debouncer.
        // The cache holds the entire DB ({ accounts, contacts, ..., _nextId }).
        // _read/_write below operate on this cache; writes are flushed to Firestore on a debounce.
        window.__cachedDb = null;       // populated after sign-in
        window.__currentUser = null;
        let __writeTimer = null;

        const flushToFirestore = () => {
            if (!window.__currentUser || !window.__cachedDb) return;
            const docRef = window.__db
                .collection('users').doc(window.__currentUser.uid)
                .collection('data').doc('main');
            // Firestore doesn't allow `undefined` field values, so strip them.
            const safe = JSON.parse(JSON.stringify(window.__cachedDb));
            docRef.set(safe).catch(err => {
                console.error('Firestore write failed:', err);
            });
        };

        const scheduleFirestoreWrite = () => {
            if (__writeTimer) clearTimeout(__writeTimer);
            __writeTimer = setTimeout(flushToFirestore, 800);
        };

        // RFC 4180 CSV parser — handles quoted fields, doubled-quote escapes, CRLF
        const parseCSV = (text) => {
            const rows = [];
            let row = [];
            let field = '';
            let inQuotes = false;
            let i = 0;
            // Strip BOM
            if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
            while (i < text.length) {
                const c = text[i];
                if (inQuotes) {
                    if (c === '"') {
                        if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
                        inQuotes = false; i++;
                    } else { field += c; i++; }
                } else {
                    if (c === '"') { inQuotes = true; i++; }
                    else if (c === ',') { row.push(field); field = ''; i++; }
                    else if (c === '\n' || c === '\r') {
                        if (c === '\r' && text[i + 1] === '\n') i++;
                        row.push(field); rows.push(row); row = []; field = ''; i++;
                    } else { field += c; i++; }
                }
            }
            if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
            if (rows.length === 0) return { headers: [], data: [] };
            const headers = rows[0].map(h => h.trim());
            const data = rows.slice(1)
                .filter(r => r.some(v => v && v.trim().length > 0))
                .map(r => {
                    const obj = {};
                    headers.forEach((h, idx) => { obj[h] = (r[idx] || '').trim(); });
                    return obj;
                });
            return { headers, data };
        };

        // Parse raw Notepad text produced by the AHK chunked-copy script.
        // Ctrl+A on a SFDC Lightning report renders each rendered row as:
        //   <row number>
        //   <field 1>
        //   <field 2>
        //   ...
        //   <field N>
        // Empty cells show as "-". Chunk markers (=====CHUNK n=====) separate pastes.
        // Rows from chunk overlap are deduped by row number.
        // columnOrder is an array of column names in the order they appear in the report.
        const parseSfdcRawText = (rawText, columnOrder) => {
            const cols = (columnOrder && columnOrder.length)
                ? columnOrder
                : ['Salutation', 'First Name', 'Last Name', 'Title', 'Account Name',
                   'Mailing Street', 'Mailing City', 'Mailing State/Province',
                   'Mailing Zip/Postal Code', 'Mailing Country', 'Phone', 'Mobile Phone',
                   'Main Email', 'Account Owner'];
            const nCols = cols.length;
            const lines = rawText.split(/\r?\n/).map(l => l.trim());
            const rowNumRegex = /^\d{1,4}$/;
            const seen = new Set();
            const records = [];
            let i = 0;
            while (i < lines.length) {
                const line = lines[i];
                if (!rowNumRegex.test(line)) { i++; continue; }
                if (i + nCols >= lines.length) { i++; continue; }
                const fields = [];
                for (let j = 1; j <= nCols; j++) {
                    const v = lines[i + j];
                    fields.push(v === '-' ? '' : (v || ''));
                }
                // Sanity: last field (Account Owner) must look like a person's name.
                // If it doesn't, this row number was a false positive — advance one line and retry.
                const owner = fields[nCols - 1];
                if (!owner || !/[A-Za-z]/.test(owner) || !owner.includes(' ')) {
                    i++; continue;
                }
                // Dedupe by row number across chunk overlaps
                if (seen.has(line)) { i += nCols + 1; continue; }
                seen.add(line);
                const row = {};
                cols.forEach((c, idx) => { row[c] = fields[idx] || ''; });
                records.push(row);
                i += nCols + 1;
            }
            return records;
        };

        // Serialize raw-parsed records back out as CSV text so buildSfdcImportPlan
        // (which speaks CSV) can consume them without modification.
        const rawRecordsToCsv = (records) => {
            if (!records || records.length === 0) return '';
            const headers = Object.keys(records[0]);
            const esc = (v) => {
                const s = v == null ? '' : String(v);
                return /[",\r\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
            };
            const rows = [headers.map(esc).join(',')];
            records.forEach(r => rows.push(headers.map(h => esc(r[h] || '')).join(',')));
            return rows.join('\n');
        };

        // Pull a value from a parsed row using case-insensitive candidate keys
        const pickField = (row, candidates) => {
            const lowered = {};
            Object.keys(row).forEach(k => { lowered[k.toLowerCase().trim()] = row[k]; });
            for (const candidate of candidates) {
                const v = lowered[candidate.toLowerCase()];
                if (v !== undefined && v !== null && String(v).trim()) return String(v).trim();
            }
            return '';
        };

        // Build the preview of what an SFDC import would do
        const buildSfdcImportPlan = (accountsCsvText, contactsCsvText, ownerFilters, existingAccounts, existingContacts) => {
            const contactsParsed = contactsCsvText ? parseCSV(contactsCsvText) : { data: [] };
            const accountsParsed = accountsCsvText ? parseCSV(accountsCsvText) : { data: [] };

            const filters = ownerFilters.map(f => f.toLowerCase().trim()).filter(Boolean);
            const ownerOf = (row) => pickField(row, ['Contact Owner', 'Account Owner', 'Owner', 'Owner Name', 'Owner Full Name', 'Owner Last Name']);
            const ownerMatches = (owner) => {
                if (!owner) return false;
                const low = owner.toLowerCase();
                return filters.length === 0 || filters.some(f => low.includes(f));
            };

            const matchingContacts = contactsParsed.data.filter(c => ownerMatches(ownerOf(c)));

            // Unique account names referenced by matching contacts (lowercased for matching)
            const neededAccountNames = new Map();
            matchingContacts.forEach(c => {
                const accName = pickField(c, ['Account Name', 'Account', 'Account: Account Name']);
                if (accName) neededAccountNames.set(accName.toLowerCase(), accName);
            });

            // Account records from CSV keyed by lowercase name
            const csvAccountsByName = {};
            accountsParsed.data.forEach(a => {
                const name = pickField(a, ['Account Name', 'Name']);
                if (name) csvAccountsByName[name.toLowerCase()] = a;
            });

            const existingAccountNames = new Set(existingAccounts.map(a => (a.name || '').toLowerCase()));
            const existingContactKeys = new Set(existingContacts.map(c =>
                `${(c.firstName || '').toLowerCase()}|${(c.lastName || '').toLowerCase()}|${(c.email || '').toLowerCase()}`
            ));

            const plannedAccounts = [];
            const skippedAccounts = [];
            neededAccountNames.forEach((originalName, lowName) => {
                const csvRow = csvAccountsByName[lowName];
                const record = {
                    name: originalName,
                    parentSystem: csvRow ? pickField(csvRow, ['Parent Account']) : '',
                    region: '',
                    address: csvRow ? pickField(csvRow, ['Billing Street', 'Street', 'Address']) : '',
                    city: csvRow ? pickField(csvRow, ['Billing City', 'City']) : '',
                    postalCode: csvRow ? pickField(csvRow, ['Billing Zip/Postal Code', 'Billing Postal Code', 'Postal Code', 'Zip']) : '',
                    phone: csvRow ? pickField(csvRow, ['Phone', 'Account Phone']) : '',
                    website: csvRow ? pickField(csvRow, ['Website']) : '',
                    incumbentVendor: '',
                    contractExpiry: '',
                    competitorSatisfaction: null,
                    notes: csvRow ? pickField(csvRow, ['Description']) : ''
                };
                if (existingAccountNames.has(lowName)) skippedAccounts.push(record);
                else plannedAccounts.push(record);
            });

            const plannedContacts = [];
            const skippedContacts = [];
            const orphanedContacts = [];
            matchingContacts.forEach(c => {
                const accName = pickField(c, ['Account Name', 'Account']);
                if (!accName) { orphanedContacts.push(c); return; }

                let firstName = pickField(c, ['First Name', 'Firstname']);
                let lastName = pickField(c, ['Last Name', 'Lastname', 'Surname']);
                if (!firstName && !lastName) {
                    const fullName = pickField(c, ['Name', 'Full Name', 'Contact Name', 'Contact: Full Name']);
                    if (fullName) {
                        const parts = fullName.split(/\s+/);
                        firstName = parts.slice(0, -1).join(' ');
                        lastName = parts[parts.length - 1] || '';
                    }
                }
                if (!lastName && !firstName) return;

                const email = pickField(c, ['Email', 'Main Email', 'Email Address']);
                const dedupeKey = `${firstName.toLowerCase()}|${lastName.toLowerCase()}|${email.toLowerCase()}`;

                const record = {
                    _accountLookupName: accName,
                    firstName,
                    lastName,
                    title: pickField(c, ['Salutation', 'Title Prefix']),
                    jobTitle: pickField(c, ['Title', 'Job Title']),
                    department: pickField(c, ['Department']),
                    email,
                    phone: pickField(c, ['Phone', 'Business Phone', 'Work Phone']),
                    mobile: pickField(c, ['Mobile Phone', 'Mobile']),
                    blueSheetRole: '',
                    responseMode: '',
                    procedures: [],
                    volumeEstimate: '',
                    influence: '',
                    notes: pickField(c, ['Description'])
                };
                if (existingContactKeys.has(dedupeKey)) skippedContacts.push(record);
                else plannedContacts.push(record);
            });

            return {
                plannedAccounts,
                skippedAccounts,
                plannedContacts,
                skippedContacts,
                orphanedContacts,
                totalMatchingContacts: matchingContacts.length,
                hasAccountsCsv: !!accountsCsvText,
                hasContactsCsv: !!contactsCsvText
            };
        };

        const storage = {
            _read: () => {
                // Prefer the in-memory cache populated from Firestore.
                if (window.__cachedDb) return window.__cachedDb;
                // Fallback: legacy localStorage data (used during migration / offline boot).
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) return JSON.parse(raw);
                } catch (e) { console.error('Storage read error:', e); }
                const empty = { _nextId: 1 };
                STORES.forEach(s => empty[s] = []);
                return empty;
            },
            _write: (db) => {
                // Write through to in-memory cache, mirror to localStorage as offline cache,
                // and schedule a debounced Firestore write.
                window.__cachedDb = db;
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch (e) { /* quota */ }
                scheduleFirestoreWrite();
            },
            getAll: (storeName) => {
                return storage._read()[storeName] || [];
            },
            add: (storeName, record) => {
                const db = storage._read();
                const id = db._nextId || 1;
                const newRecord = { ...record, id, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
                db[storeName] = db[storeName] || [];
                db[storeName].push(newRecord);
                db._nextId = id + 1;
                storage._write(db);
                return id;
            },
            update: (storeName, record) => {
                const db = storage._read();
                const list = db[storeName] || [];
                const idx = list.findIndex(r => r.id === record.id);
                if (idx !== -1) {
                    list[idx] = { ...record, updatedAt: new Date().toISOString() };
                    db[storeName] = list;
                    storage._write(db);
                }
            },
            delete: (storeName, id) => {
                const db = storage._read();
                db[storeName] = (db[storeName] || []).filter(r => r.id !== id);
                storage._write(db);
            },
            clear: () => {
                localStorage.removeItem(STORAGE_KEY);
            }

                const file = event.target.files?.[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        const replace = confirm(
                            'Replace all existing data with the imported file?\n\n' +
                            'OK = REPLACE all current data with the file (preserves IDs from the export — recommended for restoring an export).\n' +
                            'Cancel = MERGE (append records as new entries; IDs will be reassigned and you may get duplicates).'
                        );

                        if (replace) {
                            // Wholesale replace: write the imported payload directly, preserving IDs.
                            const db = { _nextId: 1 };
                            STORES.forEach(s => db[s] = []);
                            for (const [store, records] of Object.entries(imported)) {
                                if (Array.isArray(records) && STORES.includes(store)) {
                                    db[store] = records.slice();
                                }
                            }
                            // Compute next ID across all stores
                            let maxId = 0;
                            STORES.forEach(s => {
                                (db[s] || []).forEach(r => {
                                    if (typeof r.id === 'number' && r.id > maxId) maxId = r.id;
                                });
                            });
                            db._nextId = maxId + 1;
                            // Write through storage._write so the in-memory cache, localStorage,
                            // and Firestore all get updated. Otherwise __cachedDb stays empty
                            // and the UI re-reads stale data.
                            storage._write(db);
                        } else {
                            for (const [store, records] of Object.entries(imported)) {
                                if (Array.isArray(records) && STORES.includes(store)) {
                                    for (const record of records) {
                                        storage.add(store, record);
                                    }
                                }
                            }
                        }
                        refreshData();
                        alert(replace ? 'Data replaced successfully!' : 'Data imported (merged) successfully!');

            const LEGACY_REGIONS = new Set(['GTA East', 'GTA West']);
            const backfillRegionsByCity = ({ overwrite = false } = {}) => {
                const accounts = storage.getAll('accounts');
                const changed = [];
                const unknownCities = {};
                accounts.forEach(a => {
                    const current = (a.region || '').trim();
                    const isStale = !current || LEGACY_REGIONS.has(current);
                    if (!isStale && !overwrite) return;
                    const region = regionForCity(a.city);
                    if (!region) {
                        if (a.city) unknownCities[a.city] = (unknownCities[a.city] || 0) + 1;
                        return;
                    }
                    if (current === region) return;

                toExport.forEach(task => {
                    const dt = task.dueDate.replace(/-/g, '');
                    const account = data.accounts.find(a => a.id === task.accountId);
                    const contact = data.contacts.find(c => c.id === task.contactId);
                    const summary = task.description || 'CRM Task';
                    const location = account ? account.name : '';
                    const desc = [
                        task.type ? `Type: ${task.type}` : '',
                        task.priority ? `Priority: ${task.priority}` : '',
                        contact ? `Contact: ${contact.firstName} ${contact.lastName}` : '',
                        account ? `Account: ${account.name}` : ''
                    ].filter(Boolean).join('\\n');
                    lines.push('BEGIN:VEVENT');
                    lines.push(`DTSTART;VALUE=DATE:${dt}`);
                    lines.push(`DTEND;VALUE=DATE:${dt}`);
                    lines.push(`SUMMARY:${summary}`);
                    if (location) lines.push(`LOCATION:${location}`);
                    lines.push(`DESCRIPTION:${desc}`);
                    lines.push(`UID:crm-task-${task.id}@personalcrm`);
                    lines.push('END:VEVENT');

                lines.push('END:VCALENDAR');
                const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar' });

                const link = document.createElement('a');

        const Home = ({ tasks, accounts, activities, opportunities, onTaskClick, onCompleteTask, getAccountName, getContactName, setCurrentPage, onActivityClick }) => {
            const now = new Date();

            const dayLabel = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

            // Fun fact: deterministic by date (epoch days)
            const epochDay = Math.floor(now.getTime() / 86400000);
            const fact = FUN_FACTS[epochDay % FUN_FACTS.length];

            // Today's tasks + overdue (string compare on YYYY-MM-DD avoids timezone issues)
            const todayStr = new Date().toISOString().split('T')[0];
            const overdueTasks = tasks.filter(t => !t.completed && t.dueDate && t.dueDate < todayStr);
            const todayTasks = tasks.filter(t => !t.completed && t.dueDate === todayStr);

            // Upcoming: due in the next 7 days (excluding today)
            const sevenDaysOut = new Date(); sevenDaysOut.setDate(sevenDaysOut.getDate() + 7);
            const sevenDaysOutStr = sevenDaysOut.toISOString().split('T')[0];
            const upcomingThisWeek = tasks
                .filter(t => !t.completed && t.dueDate && t.dueDate > todayStr && t.dueDate <= sevenDaysOutStr)
                .sort((a, b) => a.dueDate.localeCompare(b.dueDate));

            // Group upcoming by date for clean display
            const upcomingByDate = {};
            upcomingThisWeek.forEach(t => {
                if (!upcomingByDate[t.dueDate]) upcomingByDate[t.dueDate] = [];
                upcomingByDate[t.dueDate].push(t);
            });
            const formatUpcomingDate = (ymd) => {
                const d = new Date(ymd + 'T00:00:00');
                const today = new Date(); today.setHours(0,0,0,0);
                const diffDays = Math.round((d - today) / 86400000);
                if (diffDays === 1) return 'Tomorrow';
                if (diffDays < 7) return d.toLocaleDateString('en-US', { weekday: 'long' });
                return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            };

            // Stale accounts: no activity in 60+ days
            const staleThreshold = new Date(); staleThreshold.setDate(staleThreshold.getDate() - 60);
            const lastActivityByAccount = {};

                                            {task.type} • {task.dueDate ? new Date(task.dueDate).toLocaleDateString() : 'No date'} {task.dueTime && `at ${task.dueTime}`} • {task.contactId ? getContactName(task.contactId) : task.accountId ? getAccountName(task.accountId) : 'General'}

            const renderCompletedList = () => {

            return (

                    <div style={{ marginBottom: '20px', display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
                        <select
                            value={filterType}
                            onChange={(e) => setFilterType(e.target.value)}
                            style={{ padding: '8px 12px', border: '1px solid #d0d0d0', borderRadius: '4px' }}
                        >
                            <option value="All">All Types</option>
                            {['Call', 'Email', 'Meeting', 'Follow-up', 'Demo', 'Quote', 'Internal'].map(type => (
                                <option key={type} value={type}>{type}</option>
                            ))}
                        </select>
                        <select
                            value={filterPriority}
                            onChange={(e) => setFilterPriority(e.target.value)}
                            style={{ padding: '8px 12px', border: '1px solid #d0d0d0', borderRadius: '4px' }}
                        >
                            <option value="All">All Priorities</option>

                                <option key={priority} value={priority}>{priority}</option>

                        <button className="btn small" onClick={onAddFollowUp}>+ Add Follow-up</button>
                        <button className="btn small secondary" onClick={() => exportToCalendar(tasks.filter(t => !t.completed))}>Export to Calendar (.ics)</button>
                        <button
                            className="btn small secondary"
                            onClick={() => setShowCompleted(s => !s)}
                            style={{ marginLeft: 'auto' }}
                        >
                            {showCompleted ? 'Hide Completed' : `Show Completed (${completed.length})`}
                        </button>
                    </div>

                    {!showCompleted && (
                        <React.Fragment>
                            {renderTaskList(overdue, 'Overdue Tasks')}
                            {renderTaskList(today, 'Today\'s Tasks')}
                            {renderTaskList(upcoming, 'Upcoming (Next 7 Days)')}
                            {renderTaskList(later, 'Later (8+ Days Out)')}
                            {renderTaskList(noDate, 'No Due Date')}
                        </React.Fragment>
                    )}

                    {showCompleted && (
                        <React.Fragment>
                            <div className="section-title" style={{ marginTop: 0 }}>Completed</div>
                            {renderCompletedList()}
                        </React.Fragment>
                    )}

                    {tasks.length === 0 && (
                        <div className="section">
                            <div className="empty-state">
                                <div className="empty-state-icon">✓</div>
                                <div>No tasks yet</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Activity Log Component
        const ActivityLog = ({ activities, accounts, contacts, onEdit, onDelete, getAccountName, getContactName }) => {
            const [filterType, setFilterType] = useState('All');

            const types = Array.from(new Set(activities.map(a => a.type)));
            const filtered = filterType === 'All' ? activities : activities.filter(a => a.type === filterType);
            const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));

            return (
                <div>
                    <div className="page-title">Activity Log</div>

                    <div style={{ marginBottom: '20px' }}>
                        <select
                            value={filterType}
                            onChange={(e) => setFilterType(e.target.value)}
                            style={{ padding: '8px 12px', border: '1px solid #d0d0d0', borderRadius: '4px' }}

                            <option value="All">All Types</option>

                                <option key={type} value={type}>{type}</option>

                                        <div className="activity-text">{activity.description}</div>

                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

        };

        // Territories Component
        const Territories = ({ accounts, opportunities, onSelectRegion }) => {
            const byRegion = {};
            REGIONS.forEach(region => {
                byRegion[region] = {
                    accounts: accounts.filter(a => a.region === region),
                    opportunities: opportunities.filter(o => accounts.find(a => a.id === o.accountId)?.region === region)
