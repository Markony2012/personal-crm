            });

            return (
                <div>
                    <div className="page-title">Territories</div>

                    {REGIONS.map(region => {
                        const regionData = byRegion[region];
                        const totalValue = regionData.opportunities.reduce((sum, o) => sum + (o.value || 0), 0);

                        return (
                            <div
                                key={region}
                                className="region-card"
                                onClick={() => onSelectRegion(region)}
                            >
                                <div className="region-name">{region}</div>
                                <div className="region-stats">
                                    <div className="region-stat">
                                        <span className="region-stat-label">Accounts:</span>
                                        <span className="region-stat-value">{regionData.accounts.length}</span>
                                    </div>
                                    <div className="region-stat">
                                        <span className="region-stat-label">Opportunities:</span>
                                        <span className="region-stat-value">{regionData.opportunities.length}</span>
                                    </div>
                                    <div className="region-stat">
                                        <span className="region-stat-label">Pipeline:</span>
                                        <span className="region-stat-value">${totalValue.toLocaleString()}</span>
                                    </div>
                                    <div className="region-stat">
                                        <span className="region-stat-label">Avg Deal:</span>
                                        <span className="region-stat-value">
                                            ${regionData.opportunities.length > 0 ? Math.round(totalValue / regionData.opportunities.length).toLocaleString() : '0'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        // Searchable Contact Select — combobox with type-ahead filter by name, account, or job title.
        const SearchableContactSelect = ({ value, onChange, contacts, getAccountName, placeholder = 'Search contacts by name, account, or title...' }) => {
            const [query, setQuery] = useState('');
            const [open, setOpen] = useState(false);
            const [highlight, setHighlight] = useState(0);
            const wrapRef = useRef(null);

            const selected = contacts.find(c => c.id === value);

            useEffect(() => {
                const handler = (e) => {
                    if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

            const q = query.trim().toLowerCase();
            const base = [...contacts].sort((a, b) => {
                const an = `${a.lastName || ''} ${a.firstName || ''}`.toLowerCase();
                const bn = `${b.lastName || ''} ${b.firstName || ''}`.toLowerCase();
                return an.localeCompare(bn);
            });
            const filtered = !q ? base.slice(0, 100) : base.filter(c => {
                const name = `${c.firstName || ''} ${c.lastName || ''}`.toLowerCase();
                const ids = (Array.isArray(c.accountIds) && c.accountIds.length) ? c.accountIds : (c.accountId ? [c.accountId] : []);
                const acct = getAccountName ? ids.map(id => (getAccountName(id) || '').toLowerCase()).join(' ') : '';
                const title = (c.jobTitle || '').toLowerCase();
                return name.includes(q) || acct.includes(q) || title.includes(q);
            }).slice(0, 100);

            const handleSelect = (c) => {
                onChange(c.id);
                setOpen(false);
                setQuery('');
            };

            const handleKeyDown = (e) => {
                if (!open) return;
                if (e.key === 'ArrowDown') { e.preventDefault(); setHighlight(h => Math.min(h + 1, filtered.length - 1)); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); setHighlight(h => Math.max(h - 1, 0)); }
                else if (e.key === 'Enter') { e.preventDefault(); if (filtered[highlight]) handleSelect(filtered[highlight]); }
                else if (e.key === 'Escape') { setOpen(false); }
            };

            const displayInInput = open
                ? query
                : (selected ? `${selected.firstName || ''} ${selected.lastName || ''}`.trim() : '');

            return (
                <div ref={wrapRef} style={{ position: 'relative' }}>
                    <div style={{ display: 'flex', gap: 6 }}>
                        <input
                            type="text"
                            value={displayInInput}
                            onChange={(e) => { setQuery(e.target.value); setOpen(true); setHighlight(0); }}
                            onFocus={() => { setOpen(true); setQuery(''); setHighlight(0); }}
                            onKeyDown={handleKeyDown}
                            placeholder={selected ? '' : placeholder}
                            style={{ flex: 1 }}
                        />
                        {selected && (
                            <button
                                type="button"
                                className="btn small secondary"
                                onClick={() => { onChange(null); setQuery(''); }}
                                title="Clear"
                            >
                                Clear
                            </button>
                        )}
                    </div>
                    {selected && !open && getAccountName && (selected.accountId || (Array.isArray(selected.accountIds) && selected.accountIds.length)) && (
                        <div style={{ fontSize: 11, color: '#888', marginTop: 4 }}>
                            {((Array.isArray(selected.accountIds) && selected.accountIds.length) ? selected.accountIds : [selected.accountId]).map(id => getAccountName(id)).filter(Boolean).join(', ')}{selected.jobTitle ? ` · ${selected.jobTitle}` : ''}
                        </div>
                    )}
                    {open && (
                        <div style={{
                            position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 10,
                            background: '#fff', border: '1px solid #d0d0d0', borderRadius: 4,
                            maxHeight: 260, overflowY: 'auto', boxShadow: '0 4px 8px rgba(0,0,0,0.1)', marginTop: 2
                        }}>
                            {filtered.length === 0 ? (
                                <div style={{ padding: 10, color: '#888', fontSize: 13 }}>No matches</div>
                            ) : filtered.map((c, i) => (
                                <div
                                    key={c.id}
                                    onMouseDown={(e) => { e.preventDefault(); handleSelect(c); }}
                                    onMouseEnter={() => setHighlight(i)}
                                    style={{
                                        padding: '8px 10px', cursor: 'pointer',
                                        borderBottom: '1px solid #f0f0f0', fontSize: 13,
                                        background: i === highlight ? '#f0f4ff' : '#fff'
                                    }}
                                >
                                    <div style={{ fontWeight: 600 }}>{c.firstName} {c.lastName}</div>
                                    {getAccountName && (c.accountId || (Array.isArray(c.accountIds) && c.accountIds.length)) && (
                                        <div style={{ fontSize: 11, color: '#888' }}>
                                            {((Array.isArray(c.accountIds) && c.accountIds.length) ? c.accountIds : [c.accountId]).map(id => getAccountName(id)).filter(Boolean).join(', ')}{c.jobTitle ? ` · ${c.jobTitle}` : ''}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // Related Activity Component — shown inside detail modals to display linked notes.
        const RelatedActivity = ({ activities, opportunities, getAccountName, getContactName, showAccount = false, showContact = true, showOpportunity = true }) => {
            const sorted = [...(activities || [])].sort((a, b) => new Date(b.date) - new Date(a.date));
            const getOppName = (id) => (opportunities || []).find(o => o.id === id)?.name || 'Unknown Opportunity';
            return (
                <div className="section" style={{ marginTop: 20 }}>
                    <div className="section-title">Recent Activity ({sorted.length})</div>
                    {sorted.length === 0 ? (
                        <div style={{ fontSize: 13, color: '#888', padding: '8px 0' }}>
                            No activity logged yet. Use Quick Note (top bar) to log a call, visit, or note, and link it here.
                        </div>
                    ) : (
                        <div style={{ maxHeight: 280, overflowY: 'auto' }}>
                            {sorted.map(activity => {
                                const metaBits = [];
                                if (showAccount && activity.accountId) metaBits.push(`Account: ${getAccountName(activity.accountId)}`);
                                if (showContact && activity.contactId) metaBits.push(`Contact: ${getContactName(activity.contactId)}`);
                                if (showOpportunity && activity.opportunityId) metaBits.push(`Opp: ${getOppName(activity.opportunityId)}`);
                                return (
                                    <div key={activity.id} className="activity-item">
                                        <div className="activity-date">{new Date(activity.date).toLocaleDateString()}</div>
                                        <div className="activity-content">
                                            <div className="activity-type">{activity.type}</div>
                                            <div className="activity-text">{activity.description}</div>
                                            {activity.nextStep && <div className="task-meta">Next: {activity.nextStep}</div>}
                                            {activity.followUpDate && <div className="task-meta">Follow-up: {new Date(activity.followUpDate).toLocaleDateString()}</div>}
                                            {metaBits.length > 0 && <div className="task-meta">{metaBits.join(' • ')}</div>}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // Modal Dialog Component
        const ModalDialog = ({ modal, onClose, onSave, onDelete, onSaveQuickNote, data, getAccountName, getContactName, onExecuteSfdcImport, onSwitchModal }) => {
            const [formData, setFormData] = useState(modal.data || {});
            const [activeTab, setActiveTab] = useState('general');

            // Reset form state when the modal type or data changes (e.g. switching from opportunity to task).
            // Without this, useState's initial value is stuck across modal swaps and stale fields like `id` leak in.
            useEffect(() => {
                setFormData(modal.data || {});
                setActiveTab('general');
            }, [modal.type, modal.data]);

            const handleChange = (field, value) => {
                setFormData(prev => ({ ...prev, [field]: value }));
            };

            const handleArrayChange = (field, index, value) => {
                setFormData(prev => {
                    const arr = [...(prev[field] || [])];
                    arr[index] = value;
                    return { ...prev, [field]: arr };
                });
            };

            const addArrayItem = (field) => {
                setFormData(prev => ({ ...prev, [field]: [...(prev[field] || []), ''] }));
            };

            const removeArrayItem = (field, index) => {
                setFormData(prev => ({ ...prev, [field]: (prev[field] || []).filter((_, i) => i !== index) }));
            };

            switch (modal.type) {
                case 'account':
                case 'account-detail':
                    return (
                        <ModalOverlay onClose={onClose}>
                            <ModalContent title={formData.id ? `Edit Account: ${formData.name}` : 'New Account'}>
                                <div className="form-group">
                                    <label>Account Name *</label>
                                    <input
                                        type="text"
                                        value={formData.name || ''}
                                        onChange={(e) => handleChange('name', e.target.value)}
                                        placeholder="e.g., Toronto General Hospital"
                                    />
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Parent System</label>
                                        <input
                                            type="text"
                                            value={formData.parentSystem || ''}
                                            onChange={(e) => handleChange('parentSystem', e.target.value)}
                                            placeholder="e.g., University Health Network"
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Region *</label>
                                        <select
                                            value={formData.region || ''}
                                            onChange={(e) => handleChange('region', e.target.value)}
                                        >
                                            <option value="">Select region</option>
                                            {REGIONS.map(r => (
                                                <option key={r} value={r}>{r}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Address</label>
                                        <input
                                            type="text"
                                            value={formData.address || ''}
                                            onChange={(e) => handleChange('address', e.target.value)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>City</label>
                                        <input
                                            type="text"
                                            value={formData.city || ''}
                                            onChange={(e) => handleChange('city', e.target.value)}
                                        />
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Postal Code</label>
                                        <input
                                            type="text"
                                            value={formData.postalCode || ''}
                                            onChange={(e) => handleChange('postalCode', e.target.value)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Phone</label>
                                        <input
                                            type="tel"
                                            value={formData.phone || ''}
                                            onChange={(e) => handleChange('phone', e.target.value)}
                                        />
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Website</label>
                                        <input
                                            type="url"
                                            value={formData.website || ''}
                                            onChange={(e) => handleChange('website', e.target.value)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Incumbent Vendor</label>
                                        <input
                                            type="text"
                                            value={formData.incumbentVendor || ''}
                                            onChange={(e) => handleChange('incumbentVendor', e.target.value)}
                                        />
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Contract Expiry</label>
                                        <input
                                            type="date"
                                            value={formData.contractExpiry || ''}
                                            onChange={(e) => handleChange('contractExpiry', e.target.value)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Competitor Satisfaction (1-5)</label>
                                        <select
                                            value={formData.competitorSatisfaction || 3}
                                            onChange={(e) => handleChange('competitorSatisfaction', parseInt(e.target.value))}
                                        >
                                            {[1,2,3,4,5].map(n => (
                                                <option key={n} value={n}>{n}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label>Notes</label>
                                    <textarea
                                        value={formData.notes || ''}
                                        onChange={(e) => handleChange('notes', e.target.value)}
                                        placeholder="Add notes about this account..."
                                    />
                                </div>
                                {formData.id && (() => {
                                    const accountId = formData.id;
                                    const related = (data.activities || []).filter(a =>
                                        a.accountId === accountId
                                        || (a.contactId && data.contacts.some(c => c.id === a.contactId && contactHasAccount(c, accountId)))
                                        || (a.opportunityId && data.opportunities.some(o => o.id === a.opportunityId && o.accountId === accountId))
                                    );
                                    return (
                                        <RelatedActivity
                                            activities={related}
                                            opportunities={data.opportunities}
                                            getAccountName={getAccountName}
                                            getContactName={getContactName}
                                            showAccount={false}
                                            showContact={true}
                                            showOpportunity={true}
                                        />
                                    );
                                })()}
                                <div style={{ display: 'flex', gap: '10px', marginTop: '20px' }}>
                                    <button className="btn" onClick={() => onSave('accounts', formData)}>Save</button>
                                    <button className="btn secondary" onClick={onClose}>Cancel</button>
                                    {formData.id && <button className="btn danger" onClick={() => onDelete('accounts', formData.id)}>Delete</button>}
                                </div>
                            </ModalContent>
                        </ModalOverlay>
                    );

                case 'contact':
                case 'contact-detail':
                    return (
                        <ModalOverlay onClose={onClose}>
                            <ModalContent title={formData.id ? `Edit Contact: ${formData.firstName} ${formData.lastName}` : 'New Contact'}>
                                <div className="form-group">
                                    <label>Accounts * <span style={{ fontWeight: 'normal', color: '#888', fontSize: '12px' }}>(hold Ctrl/Cmd to select multiple; first selected is primary)</span></label>
                                    {(() => {
                                        const currentIds = Array.isArray(formData.accountIds) && formData.accountIds.length
                                            ? formData.accountIds
                                            : (formData.accountId ? [formData.accountId] : []);
                                        const sortedAccounts = [...data.accounts].sort((a, b) => a.name.localeCompare(b.name));
                                        return (
                                            <React.Fragment>
                                                <select
                                                    multiple
                                                    size={Math.min(8, Math.max(4, sortedAccounts.length))}
                                                    value={currentIds.map(String)}
                                                    onChange={(e) => {
                                                        const selected = Array.from(e.target.selectedOptions).map(o => parseInt(o.value));
                                                        // Preserve order of currently selected ids that are still selected, then append new ones
                                                        const preserved = currentIds.filter(id => selected.includes(id));
                                                        const added = selected.filter(id => !preserved.includes(id));
                                                        const next = [...preserved, ...added];
                                                        handleChange('accountIds', next);
                                                        handleChange('accountId', next[0] || null);
                                                    }}
                                                    style={{ width: '100%' }}
                                                >
                                                    {sortedAccounts.map(a => (
                                                        <option key={a.id} value={a.id}>{a.name}</option>
                                                    ))}
                                                </select>
                                                {currentIds.length > 0 && (
                                                    <div style={{ marginTop: '6px', fontSize: '12px', color: '#aaa' }}>
                                                        Selected: {currentIds.map(id => data.accounts.find(a => a.id === id)?.name).filter(Boolean).join(', ')}
                                                    </div>
                                                )}
                                            </React.Fragment>
                                        );
                                    })()}
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>First Name *</label>
                                        <input
                                            type="text"
                                            value={formData.firstName || ''}
                                            onChange={(e) => handleChange('firstName', e.target.value)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Last Name *</label>
                                        <input
                                            type="text"
                                            value={formData.lastName || ''}
                                            onChange={(e) => handleChange('lastName', e.target.value)}
                                        />
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Title</label>

                                    </div>
                                </div>
                                <div className="form-group">
                                    <label>Mobile</label>
                                    <input
                                        type="tel"
                                        value={formData.mobile || ''}
                                        onChange={(e) => handleChange('mobile', e.target.value)}
                                    />
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Blue Sheet Role</label>
                                        <select
                                            value={formData.blueSheetRole || ''}
                                            onChange={(e) => handleChange('blueSheetRole', e.target.value)}
                                        >
                                            <option value="">Select role</option>
                                            <option value="Economic Buyer">Economic Buyer</option>
                                            <option value="User Buyer">User Buyer</option>
                                            <option value="Technical Buyer">Technical Buyer</option>
                                            <option value="Coach">Coach</option>
                                            <option value="None">None</option>
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label>Response Mode</label>
                                        <select
                                            value={formData.responseMode || ''}
                                            onChange={(e) => handleChange('responseMode', e.target.value)}
                                        >

                                            <option value="Growth">Growth</option>
                                            <option value="Trouble">Trouble</option>
                                            <option value="Even Keel">Even Keel</option>
                                            <option value="Overconfident">Overconfident</option>

                                    <textarea

                                </div>
                                <div className="form-group">
                                    <label>Volume Estimate</label>
                                    <input
                                        type="text"
                                        value={formData.volumeEstimate || ''}

                                        placeholder="e.g., 200/year"
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Notes</label>
                                    <textarea
                                        value={formData.notes || ''}
                                        onChange={(e) => handleChange('notes', e.target.value)}
                                    />

                                {formData.id && (
                                    <RelatedActivity
                                        activities={(data.activities || []).filter(a => a.contactId === formData.id)}
                                        opportunities={data.opportunities}
                                        getAccountName={getAccountName}
                                        getContactName={getContactName}
                                        showAccount={true}
                                        showContact={false}
                                        showOpportunity={true}

                    );

                case 'opportunity':
                case 'opportunity-detail':
                    const stageQuestions = STAGE_QUESTIONS[formData.stage] || [];
                    const stageChecklist = formData.stageChecklist || {};

                    const accountContacts = data.contacts.filter(c => contactHasAccount(c, formData.accountId));
                    const stakeholderState = formData.stakeholders || {};
                    const visibleContacts = accountContacts.filter(c => !stakeholderState[c.id]?.hidden);
                    const hiddenContacts = accountContacts.filter(c => stakeholderState[c.id]?.hidden);

                    const gapFlags = [];
                    if (visibleContacts.length > 0) {
                        const hasEB = visibleContacts.some(c => c.blueSheetRole === 'Economic Buyer');
                        const hasCoach = visibleContacts.some(c => c.blueSheetRole === 'Coach');
                        if (!hasEB) gapFlags.push('No Economic Buyer identified. You need someone who can release the budget.');
                        if (!hasCoach) gapFlags.push('No Coach identified. Find an internal advocate feeding you intel.');
                        const unknownMode = visibleContacts.filter(c => !c.responseMode || c.responseMode === 'Unknown');
                        if (unknownMode.length > 0) gapFlags.push(`${unknownMode.length} contact(s) with unknown response mode.`);
                        const highInfluenceOpponents = visibleContacts.filter(c => c.influence === 'High' && stakeholderState[c.id]?.rating === 'Opponent');
                        if (highInfluenceOpponents.length > 0) gapFlags.push(`High-influence opponent: ${highInfluenceOpponents.map(c => `${c.firstName} ${c.lastName}`).join(', ')}`);
                    }

                    const updateStakeholder = (contactId, field, value) => {
                        setFormData(prev => ({
                            ...prev,
                            stakeholders: {
                                ...(prev.stakeholders || {}),
                                [contactId]: { ...((prev.stakeholders || {})[contactId] || {}), [field]: value }
                            }
                        }));
                    };

                    const ratingColor = { Supporter: '#2e7d32', Neutral: '#616161', Opponent: '#c62828' };
                    const responseColor = { Growth: '#2e7d32', Trouble: '#c62828', 'Even Keel': '#616161', Overconfident: '#f57c00', Unknown: '#999' };

                    return (
                        <ModalOverlay onClose={onClose}>
                            <ModalContent title={formData.id ? `Edit Opportunity: ${formData.name}` : 'New Opportunity'} wide={true}>
                                <div className="tabs">
                                    <div
                                        className={`tab ${activeTab === 'general' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('general')}
                                    >
                                        General
                                    </div>
                                    <div
                                        className={`tab ${activeTab === 'stage' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('stage')}
                                    >
                                        Stage Checklist
                                    </div>
                                    <div
                                        className={`tab ${activeTab === 'bluesheet' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('bluesheet')}
                                    >
                                        Blue Sheet
                                    </div>
                                </div>

                                <div className={`tab-content ${activeTab === 'general' ? 'active' : ''}`}>
                                    <div className="form-group">
                                        <label>Opportunity Name *</label>
                                        <input
                                            type="text"
                                            value={formData.name || ''}
                                            onChange={(e) => handleChange('name', e.target.value)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Account *</label>
                                        <select
                                            value={formData.accountId || ''}
                                            onChange={(e) => handleChange('accountId', parseInt(e.target.value))}
                                        >
                                            <option value="">Select account</option>
                                            {data.accounts.map(a => (
                                                <option key={a.id} value={a.id}>{a.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="form-row">
                                        <div className="form-group">
                                            <label>Stage *</label>
                                            <select
                                                value={formData.stage || ''}
                                                onChange={(e) => { handleChange('stage', e.target.value); handleChange('confidence', STAGE_DEFAULT_CONFIDENCE[e.target.value] || ''); }}
                                            >
                                                <option value="">Select stage</option>
                                                {STAGES.map(s => (
                                                    <option key={s} value={s}>{s}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div className="form-group">
                                            <label>Product Type</label>
                                            <select
                                                value={formData.productType || ''}
                                                onChange={(e) => handleChange('productType', e.target.value)}
                                            >
                                                <option value="">Select type</option>
                                                <option value="Capital">Capital</option>
                                                <option value="Consumable">Consumable</option>
                                                <option value="Both">Both</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="form-row">
                                        <div className="form-group">
                                            <label>Value ($)</label>
                                            <input
                                                type="number"
                                                value={formData.value || ''}
                                                onChange={(e) => handleChange('value', parseInt(e.target.value))}
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label>Confidence</label>
                                            <select
                                                value={formData.confidence || ''}
                                                onChange={(e) => handleChange('confidence', e.target.value)}
                                            >
                                                <option value="">Select...</option>
                                                {CONFIDENCE_LEVELS.map(level => (
                                                    <option key={level} value={level}>{level} ({Math.round(CONFIDENCE_WEIGHTS[level] * 100)}%)</option>
                                                ))}
                                            </select>
                                            <div style={{ fontSize: '11px', color: '#888', marginTop: '4px' }}>
                                                Stage default: {STAGE_DEFAULT_CONFIDENCE[formData.stage] || '-'}. Override if deal is running hotter or colder.
                                            </div>
                                        </div>
                                    </div>
                                    <div className="form-group">
                                        <label>Close Date</label>
                                        <input
                                            type="date"
                                            value={formData.closeDate || ''}
                                            onChange={(e) => handleChange('closeDate', e.target.value)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Competitor Info</label>
                                        <textarea
                                            value={formData.competitorInfo || ''}
                                            onChange={(e) => handleChange('competitorInfo', e.target.value)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Red Flags (one per line)</label>
                                        <textarea
                                            value={(formData.redFlags || []).join('\n')}
                                            onChange={(e) => handleChange('redFlags', e.target.value.split('\n').filter(x => x.trim()))}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Strengths (one per line)</label>
                                        <textarea
                                            value={(formData.strengths || []).join('\n')}
                                            onChange={(e) => handleChange('strengths', e.target.value.split('\n').filter(x => x.trim()))}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Notes</label>
                                        <textarea
                                            value={formData.notes || ''}
                                            onChange={(e) => handleChange('notes', e.target.value)}
                                        />
                                    </div>
                                </div>

                                <div className={`tab-content ${activeTab === 'stage' ? 'active' : ''}`}>
                                    {stageQuestions.length > 0 ? (
                                        <div className="checklist">
                                            <div className="section-title">{formData.stage} Checklist</div>
                                            {stageQuestions.map((question, index) => (
                                                <div key={index} className="checklist-item">
                                                    <input
                                                        type="checkbox"
                                                        id={`q-${index}`}
                                                        checked={stageChecklist[index] || false}
                                                        onChange={(e) => {
                                                            const updated = { ...stageChecklist, [index]: e.target.checked };
                                                            handleChange('stageChecklist', updated);
                                                        }}
                                                    />
                                                    <label htmlFor={`q-${index}`}>{question}</label>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="empty-state">
                                            <div className="empty-state-icon">📋</div>
                                            <div>Select a stage to see checklist</div>
                                        </div>
                                    )}
                                </div>

                                <div className={`tab-content ${activeTab === 'bluesheet' ? 'active' : ''}`}>
                                    <div className="form-group">
                                        <label>Sales Objective</label>
                                        <textarea
                                            value={formData.singleSalesObjective || ''}
                                            onChange={(e) => handleChange('singleSalesObjective', e.target.value)}

                                            value={formData.idealCustomerFit || ''}

                                        </div>

                                        {!formData.accountId ? (
                                            <div style={{ padding: 16, background: '#fff8e1', border: '1px solid #ffe082', borderRadius: 6, fontSize: 13 }}>
                                                Pick an account on the General tab to populate the stakeholder map.

                                        ) : accountContacts.length === 0 ? (
                                            <div style={{ padding: 16, background: '#f5f5f5', border: '1px solid #e0e0e0', borderRadius: 6, fontSize: 13 }}>

                                                {gapFlags.length > 0 && (

                                                        <ul style={{ margin: 0, paddingLeft: 20 }}>
                                                            {gapFlags.map((flag, i) => (
                                                                <li key={i} style={{ marginBottom: 2 }}>{flag}</li>

                                                    </div>

                                                {visibleContacts.length === 0 ? (
